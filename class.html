<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدرس</title>

<link rel="stylesheet" href="style.css">

<style>
/* صندوق الدرس */
.lesson-box {
    width: 70%;
    margin: 40px auto;
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 15px;
    color: #333;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    text-align: center;
}

/* صندوق المرشد */
.ask-box {
    width: 70%;
    margin: 30px auto;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 15px;
    color: #333;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    text-align: center;
}

/* زر المرشد */
.ask-btn {
    background-color: #1B4332;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    margin-top: 15px;
    width: 260px;
    text-align: center;
    box-shadow: 0 0 15px rgba(27, 67, 50, 0.6);
    animation: glowBtn 1.5s infinite alternate;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

/* تأثير اللمعان */
@keyframes glowBtn {
    from {
        box-shadow: 0 0 10px rgba(27, 67, 50, 0.4);
        transform: scale(1);
    }
    to {
        box-shadow: 0 0 25px rgba(27, 67, 50, 0.9);
        transform: scale(1.05);
    }
}

.ask-btn:hover {
    background-color: #145a41;
}
</style>

</head>

<body>

<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<div class="logo">
    <img src="logo.jpg">
</div>

<!-- صندوق الدرس -->
<div class="lesson-box">
    <h1>الدرس التعليمي</h1>
    <p>
        هنا يظهر محتوى الدرس الذي اختره الطالب،  
        ويمكنك إضافة نصوص أو فيديو أو صور تعليمية.
    </p>
</div>

<!-- صندوق المرشد -->
<div class="ask-box">
    <h2>لمزيد من الأسئلة اسأل مرشدك</h2>

    <button class="ask-btn" onclick="window.location.href='khabir2.html'">
        🤖 اسأل مرشدك الآن
    </button>
</div>

</body>
</html>
