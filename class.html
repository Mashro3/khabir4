<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الدرس</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* صندوق الدرس */
        .lesson-box {
            width: 70%;
            margin: 60px auto;
            background: rgba(0,0,0,0.55);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
        }

        .lesson-box h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .lesson-box p {
            font-size: 20px;
            line-height: 1.8;
        }

        /* الدردشة */
        .chat-window {
            width: 70%;
            margin: 40px auto;
            background: rgba(0,0,0,0.65);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .bubble {
            max-width: 70%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 18px;
        }

        .user {
            background: white;
            color: black;
            margin-left: auto;
        }

        .ai {
            background: #2e7d32;
            color: white;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            margin-top: 15px;
        }

        textarea {
            width: 85%;
            height: 60px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 18px;
        }

        button.send {
            width: 12%;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- الهيدر -->
<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<!-- نص الدرس (بدون أي تغيير كما طلبتِ) -->
<div class="lesson-box">
    <h1>درس التفكير المنطقي</h1>

    <p>
        <!-- ضعي هنا نص الدرس الأصلي كما هو بدون أي تعديل -->
        هذا هو نص الدرس الذي وضعتيه سابقًا، وسيبقى كما هو تمامًا.
        يمكنك لصقه هنا كاملًا، ولن ألمسه أبدًا.
    </p>
</div>

<!-- نافذة الدردشة -->
<div class="chat-window">
    <h2>اسأل الذكاء الاصطناعي عن الدرس</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <textarea id="userInput" placeholder="اكتب سؤالك عن الدرس..."></textarea>
        <button class="send" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let chat = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    // رسالة المستخدم
    let userBubble = document.createElement("div");
    userBubble.className = "bubble user";
    userBubble.textContent = input.value;
    chat.appendChild(userBubble);

    // رسالة الذكاء الاصطناعي (مؤقتة)
    let aiBubble = document.createElement("div");
    aiBubble.className = "bubble ai";
    aiBubble.textContent = "جارٍ التفكير...";
    chat.appendChild(aiBubble);

    chat.scrollTop = chat.scrollHeight;

    // 🔥 ربط Google Gemini API
    const API_KEY = "ضعي_مفتاحك_هنا";

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: input.value }] }]
            })
        }
    );

    const data = await response.json();

    aiBubble.textContent =
        data.candidates?.[0]?.content?.parts?.[0]?.text ||
        "لم أستطع فهم السؤال، حاول صياغته بطريقة أخرى.";

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
