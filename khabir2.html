
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المرشدون</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* اللوقو */
        .logo {
            text-align: center;
            margin-top: 20px;
        }

        .logo img {
            width: 150px;
        }

        /* شبكة المرشدين */
        .mentors-grid {
            width: 80%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .mentor-card {
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-radius: 15px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            transition: 0.3s;
            cursor: pointer;
        }

        .mentor-card:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
            color: #2e7d32;
        }

        .mentor-card h3 {
            font-size: 24px;
            color: #2e7d32;
        }

        .mentor-card p {
            font-size: 18px;
            color: #444;
        }

        .mentor-card button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .mentor-card button:hover {
            background: #256628;
        }

        /* صندوق الشات */
        .chat-box {
            width: 70%;
            margin: 40px auto;
            background: rgba(0,0,0,0.55);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
            display: none;
        }

        textarea {
            width: 90%;
            height: 80px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 18px;
        }

        button.send {
            margin-top: 15px;
            padding: 12px 25px;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .answer {
            margin-top: 20px;
            background: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            color: white;
            display: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- الهيدر -->
<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<!-- اللوقو -->
<div class="logo">
    <img src="logo.jpg" alt="شعار المنصة">
</div>

<h1>اختر مرشدك</h1>

<!-- شبكة المرشدين -->
<div class="mentors-grid">

    <!-- المرشد التقني -->
    <div class="mentor-card" onclick="selectMentor('tech')">
        <div class="icon">💻</div>
        <h3>المرشد التقني</h3>
        <p>متخصص في التقنية والبرمجة والشبكات.</p>
        <button>ابدأ المحادثة</button>
    </div>

    <!-- المرشد الطبي -->
    <div class="mentor-card" onclick="selectMentor('medical')">
        <div class="icon">🩺</div>
        <h3>المرشد الطبي</h3>
        <p>متخصص في أساسيات الطب والصحة.</p>
        <button>ابدأ المحادثة</button>
    </div>

    <!-- المرشد الإداري -->
    <div class="mentor-card" onclick="selectMentor('management')">
        <div class="icon">📊</div>
        <h3>المرشد الإداري</h3>
        <p>متخصص في الإدارة واتخاذ القرار.</p>
        <button>ابدأ المحادثة</button>
    </div>

</div>

<!-- صندوق الشات -->
<div id="chatBox" class="chat-box">
    <h2>💬 اسأل مرشدك</h2>

    <textarea id="question" placeholder="اكتب سؤالك هنا..."></textarea>
    <br>
    <button class="send" onclick="reply()">إرسال</button>

    <div id="answer" class="answer"></div>
</div>

<script>
let specialty = "";

function selectMentor(type) {
    specialty = type;
    document.getElementById("chatBox").style.display = "block";
    document.getElementById("answer").style.display = "none";
}

function reply() {
    let q = document.getElementById("question").value.trim();
    let ans = document.getElementById("answer");

    if (q === "") {
        ans.style.display = "block";
        ans.style.background = "#b71c1c";
        ans.textContent = "✖ الرجاء كتابة سؤال";
        return;
    }

    let text = q.toLowerCase();
    let response = "";

    /* المرشد التقني */
    if (specialty === "tech") {
        if (text.includes("برمجة")) response = "البرمجة هي إعطاء أوامر للحاسوب باستخدام لغات مثل Python وJavaScript.";
        else if (text.includes("موقع")) response = "تطوير المواقع يتم باستخدام HTML وCSS وJavaScript.";
        else if (text.includes("شبكات")) response = "الشبكات تربط الأجهزة ببعضها لتبادل البيانات. أهم المفاهيم: IP – Router – DNS.";
        else if (text.includes("تطبيق")) response = "تطوير التطبيقات يتم باستخدام Flutter أو Swift أو Java.";
        else response = "اسألني عن البرمجة، المواقع، التطبيقات، أو الشبكات.";
    }

    /* المرشد الطبي */
    else if (specialty === "medical") {
        if (text.includes("قلب")) response = "القلب يضخ الدم إلى جميع أجزاء الجسم.";
        else if (text.includes("رئة")) response = "الرئتان مسؤولة عن تبادل الأكسجين وثاني أكسيد الكربون.";
        else if (text.includes("عظام")) response = "العظام توفر الدعم للجسم وتساعد على الحركة.";
        else if (text.includes("جهاز هضمي")) response = "الجهاز الهضمي مسؤول عن هضم الطعام وامتصاص العناصر الغذائية.";
        else response = "اسألني عن القلب، الرئتين، العظام، أو أي عضو آخر.";
    }

    /* المرشد الإداري */
    else if (specialty === "management") {
        if (text.includes("إدارة")) response = "الإدارة هي تنظيم الموارد لتحقيق الأهداف بكفاءة.";
        else if (text.includes("قرار")) response = "اتخاذ القرار يعتمد على تحليل المعلومات واختيار أفضل بديل.";
        else if (text.includes("قيادة")) response = "القيادة هي التأثير في الآخرين لتحقيق الأهداف.";
        else if (text.includes("تنظيم")) response = "التنظيم هو ترتيب المهام وتوزيع الأدوار لتحقيق الإنتاجية.";
        else response = "اسألني عن الإدارة، القيادة، أو اتخاذ القرار.";
    }

    ans.style.display = "block";
    ans.style.background = "#2e7d32";
    ans.textContent = response;
    document.getElementById("question").value = "";
}
</script>

</body>
</html>
