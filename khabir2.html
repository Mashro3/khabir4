<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المرشد</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* صندوق المحادثة */
        .chat-box {
            width: 70%;
            height: 450px;
            margin: 80px auto 20px;
            background: rgba(0,0,0,0.55);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 15px black;
        }

        .message {
            background: white;
            color: black;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            width: fit-content;
            max-width: 80%;
        }

        .ai {
            background: #2e7d32;
            color: white;
            margin-right: auto;
        }

        /* مربع الكتابة */
        .input-area {
            width: 70%;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }

        textarea {
            width: 88%;
            height: 60px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 18px;
        }

        button {
            width: 10%;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #256628;
        }
    </style>
</head>

<body>

<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<div class="chat-box" id="chatBox">
    <!-- الرسائل تظهر هنا -->
</div>

<div class="input-area">
    <textarea id="userInput" placeholder="اكتب سؤالك هنا..."></textarea>
    <button onclick="sendMessage()">➤</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let chat = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    // رسالة الطالب
    let userMsg = document.createElement("div");
    userMsg.className = "message";
    userMsg.textContent = input.value;
    chat.appendChild(userMsg);

    // رد الذكاء الاصطناعي
    let aiMsg = document.createElement("div");
    aiMsg.className = "message ai";
    aiMsg.textContent = "جارٍ تحليل سؤالك...";

    chat.appendChild(aiMsg);

    // محاكاة ذكاء اصطناعي بسيط
    setTimeout(() => {
        aiMsg.textContent = "هذا رد ذكي تلقائي: " + input.value;
    }, 1000);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
