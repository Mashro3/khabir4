
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>المرشدون | منصة خبير</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    color: #ffffff;
}

/* الهيدر */
header {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    border-bottom: 3px solid #FFD700;
}

header img {
    height: 70px;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: #FFD700;
}

/* تسجيل الدخول */
.login-container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
    width: 350px;
    margin: 40px auto;
    color: #1B4332;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #C1E1C1;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #FFD700;
    color: #1B4332;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background-color: #e6c200;
}

/* قسم المرشدين */
h1 {
    text-align: center;
    margin-top: 40px;
    color: #ffffff;
}

.mentors {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding-bottom: 40px;
}

.card {
    background: rgba(255,255,255,0.9);
    padding: 20px;
    width: 260px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border: 1px solid #E0D7C6;
    transition: transform 0.3s ease;
    color: #1B4332;
}

.card:hover {
    transform: translateY(-5px);
}

.card button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #2D5A27;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.chat-box {
    display: none;
    margin-top: 15px;
    border: 1px solid #E0D7C6;
    border-radius: 12px;
    overflow: hidden;
}

.messages {
    height: 200px;
    overflow-y: auto;
    background: #FCFAF5;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.input-area {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: #fff;
    border-top: 1px solid #E0D7C6;
}

.input-area input {
    flex: 1;
    padding: 12px;
    border: 1.5px solid #E0D7C6;
    border-radius: 25px;
}

.message {
    padding: 10px 14px;
    background-color: #F9F7F2;
    border-radius: 12px;
    font-size: 14px;
    color: #333;
    max-width: 85%;
}
</style>
</head>

<body>

<header>
    <img src="logo.jpg" alt="شعار خبير">

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="khabir2.html">المرشدون</a>
        <a href="kabear8.html">الدروس</a>
        <a href="update_page.html">حسابي</a>
    </nav>
</header>

<!-- تسجيل الدخول -->
<div class="login-container" id="login-box">
<h2>تسجيل الدخول</h2>

<form id="loginForm">
    <input type="text" name="username" placeholder="اسم المستخدم" required>
    <input type="password" name="password" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
</form>
</div>

<!-- قسم المرشدين -->
<div id="experts-section" style="display:none; width:100%;">

<h1>اختر مرشدك</h1>

<div class="mentors">

    <!-- بطاقة 1 -->
    <div class="card">
        <h3>مرشد تقنية</h3>
        <p>تخصص برمجة</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد التقنية 👨‍💻</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 2 -->
    <div class="card">
        <h3>مرشد طبي</h3>
        <p>تخصص طب</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد طبي 🩺</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 3 -->
    <div class="card">
        <h3>مرشد إدارة</h3>
        <p>إدارة أعمال</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد إداري 📊</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

</div>
</div>

<script>
function toggleChat(button) {
    let card = button.parentElement;
    let chat = card.querySelector(".chat-box");

    chat.style.display = (chat.style.display === "none" || chat.style.display === "")
        ? "block"
        : "none";
}

function sendMessage(btn) {
    let card = btn.closest(".card");
    let input = card.querySelector(".input-area input");
    let messages = card.querySelector(".messages");

    let msg = input.value.trim();
    if (msg === "") return;

    messages.innerHTML += `<div class="message">${msg}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;
}

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("login-box").style.display = "none";
    document.getElementById("experts-section").style.display = "block";
});
</script>

</body>
</html>
