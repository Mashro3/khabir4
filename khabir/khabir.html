<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خبير</title>
     <style>body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background-color:#f9f9f9;
}

header {
    background-color: #4CAF50;
    color: white;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items:center;
}

nav a {
    color: white;
    margin:0 10px;
    text-decoration: none;
    font-weight:bold;
}

.hero {
    text-align: center;
    padding: 80px 20px;
    background-color: #f4f4f4;
}

.hero button {
    padding: 12px 25px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius:5px
    cursor:pointer
    font-size 16px
}

.features {
    display: flex;
    justify-content: space-around;
    padding: 50px;
    flex-wrap:wrap;
}

.card {
    background-color: white;
    padding: 20px;
    margin: 10px;
    border-radius:8px;
    text-align: center;
    width:250px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.login-box {
    width: 300px;
    margin: 100px auto;
    text-align: center;
    background-color:#ffffff;
    padding:30px
    border-radius:10px
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    
}

.login-box input {
    display: block;
    margin: 15px 0;
    padding: 12px;
    width: 100%;
    border:1px solid #ddd
    border-radius:5px;
    box-sizing:border-box;
    font-size:14px;
}

.login-box input:focus{
    border-color:#4CAF50;
    outline:none;
}</style>              
    <link rel="stylesheet" href="style.css?v=1.1">
    
</head>
<body>

<header>
    <h1>منصة خبير</h1>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">تسجيل الدخول</a>
        <a href="#">إنشاء حساب</a>
    </nav>
</header>

<section class="hero">
    <h2>خبرتك تصنع مستقبلاً</h2>
   <p>منصة تربط الطلاب بالخبراء والمعلمين لتبادل الخبرات والمساعدة الأكاديمية</p>
    <button>ابدأ الآن</button>
</section>

<section class="features">
    <div class="card">
        <h3>طلاب</h3>
       <p>احصل على شرح ومساعدة أكاديمية بسهولة</p>
    </div>

    <div class="card">
       <h3>خبراء</h3>
        <p>شارك خبرتك وساعد الاخرين</p>
    </div>

    <div class="card">
      <h3>معلمون</h3>
        <p>قدم جلسات تعليمية احترافية</p>
    </div>
</section>

<footer>
    <p>© 2026 منصة خبيرة</p>
</footer>

</body>
</html>
