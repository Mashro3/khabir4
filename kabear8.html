<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الدروس | منصة خبير</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
        }

        /* الهيدر */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            border-bottom: 3px solid #FFD700;
        }

        header img {
            height: 70px;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* عنوان الصفحة */
        h1 {
            text-align: center;
            margin-top: 40px;
            color: #FFD700;
            font-size: 36px;
        }

        /* بطاقات الدروس */
        .lessons-container {
            width: 85%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .lesson-card {
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #FFD700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            text-align: center;
            transition: 0.3s;
            color: #1B4332;
        }

        .lesson-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }

        .lesson-card h3 {
            color: #2D6A4F;
            margin-bottom: 10px;
        }

        .lesson-card p {
            color: #333;
            margin-bottom: 15px;
        }

        .open-btn {
            padding: 10px 20px;
            background: #FFD700;
            color: #1B4332;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .open-btn:hover {
            background: #e6c200;
        }
    </style>
</head>

<body>

    <!-- الهيدر -->
    <header>
        <img src="logo.jpg" alt="شعار خبير">
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="khabir2.html">المرشدون</a>
            <a href="kabear8.html">الدروس</a>
            <a href="update_page.html">حسابي</a>
        </nav>
    </header>

    <!-- عنوان الصفحة -->
    <h1>الدروس المتاحة</h1>

    <!-- بطاقات الدروس -->
    <div class="lessons-container">

        <div class="lesson-card">
            <h3>درس التفكير المنطقي</h3>
            <p>مقدمة في مهارات التفكير والتحليل.</p>
            <a href="class.html" class="open-btn">فتح الدرس</a>
        </div>

        <div class="lesson-card">
            <h3>أساسيات البرمجة</h3>
            <p>تعلم المفاهيم الأساسية للبرمجة.</p>
            <a href="#" class="open-btn">فتح الدرس</a>
        </div>

        <div class="lesson-card">
            <h3>مهارات الإدارة</h3>
            <p>أساسيات إدارة الوقت والمهام.</p>
            <a href="#" class="open-btn">فتح الدرس</a>
        </div>

    </div>

</body>
</html>
