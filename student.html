<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الطالب</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* بطاقات الدروس */
        .lessons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 80px;
            flex-wrap: wrap;
        }

        .card {
            width: 260px;
            background: rgba(0,0,0,0.55);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px black;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 15px;
            background: white;
            padding: 10px;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 24px;
        }

        .card button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* نافذة الدردشة */
        .chat-window {
            display: none;
            width: 70%;
            margin: 50px auto;
            background: rgba(0,0,0,0.65);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
        }

        .chat-box {
            height: 350px;
            overflow-y: auto;
            padding: 10px;
        }

        .bubble {
            max-width: 70%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 18px;
        }

        .user {
            background: white;
            color: black;
            margin-left: auto;
        }

        .ai {
            background: #2e7d32;
            color: white;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            margin-top: 15px;
        }

        textarea {
            width: 85%;
            height: 60px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 18px;
        }

        button.send {
            width: 12%;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<!-- بطاقات الدروس -->
<div class="lessons">

    <div class="card" onclick="openChat('درس البرمجة')">
        <img src="https://cdn-icons-png.flaticon.com/512/2721/2721297.png">
        <h3>درس البرمجة</h3>
        <button>اسأل الذكاء الاصطناعي</button>
    </div>

    <div class="card" onclick="openChat('درس الصحة')">
        <img src="https://cdn-icons-png.flaticon.com/512/387/387561.png">
        <h3>درس الصحة</h3>
        <button>اسأل الذكاء الاصطناعي</button>
    </div>

    <div class="card" onclick="openChat('درس الإدارة')">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <h3>درس الإدارة</h3>
        <button>اسأل الذكاء الاصطناعي</button>
    </div>

</div>

<!-- نافذة الدردشة -->
<div class="chat-window" id="chatWindow">
    <h2 id="lessonName"></h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <textarea id="userInput" placeholder="اكتب سؤالك هنا..."></textarea>
        <button class="send" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
function openChat(name) {
    document.getElementById("lessonName").textContent = name;
    document.getElementById("chatWindow").style.display = "block";
    document.getElementById("chatBox").innerHTML = "";
}

async function sendMessage() {
    let input = document.getElementById("userInput");
    let chat = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    // رسالة المستخدم
    let userBubble = document.createElement("div");
    userBubble.className = "bubble user";
    userBubble.textContent = input.value;
    chat.appendChild(userBubble);

    // رسالة الذكاء الاصطناعي (مؤقتة)
    let aiBubble = document.createElement("div");
    aiBubble.className = "bubble ai";
    aiBubble.textContent = "جارٍ التفكير...";
    chat.appendChild(aiBubble);

    chat.scrollTop = chat.scrollHeight;

    // 🔥 ربط Google Gemini API
    const API_KEY = "ضعي_مفتاحك_هنا";

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: input.value }] }]
            })
        }
    );

    const data = await response.json();

    aiBubble.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || "لم أستطع فهم السؤال، حاول صياغته بطريقة أخرى.";

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
