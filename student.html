<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>صفحة الطالب</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Cairo", sans-serif;
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}

header {
    display: flex;
    justify-content: flex-end;
    padding: 20px 40px;
}

header a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px black;
}

.logo img {
    width: 150px;
    margin-top: 20px;
}

.student-box {
    width: 70%;
    margin: 40px auto;
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 15px;
    color: #333;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

select {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
}

/* زر جيمني الجديد */
.gemini-btn {
    background-color: #1B4332;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    margin-top: 20px;
    width: 260px;
    text-align: center;
    box-shadow: 0 0 15px rgba(27, 67, 50, 0.6);
    animation: glowBtn 1.5s infinite alternate;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

/* تأثير اللمعان */
@keyframes glowBtn {
    from {
        box-shadow: 0 0 10px rgba(27, 67, 50, 0.4);
        transform: scale(1);
    }
    to {
        box-shadow: 0 0 25px rgba(27, 67, 50, 0.9);
        transform: scale(1.05);
    }
}

.gemini-btn:hover {
    background-color: #145a41;
}
</style>

</head>
<body>

<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<div class="logo">
    <img src="logo.jpg">
</div>

<div class="student-box">

    <h1>مرحبًا بك يا طالب</h1>
    <h3>اختر تخصص سؤالك</h3>

    <select id="specialty">
        <option value="tech">تقني 💻</option>
        <option value="medical">طبي 🩺</option>
        <option value="management">إداري 📊</option>
    </select>

    <!-- زر جيمني الجديد -->
    <button class="gemini-btn" onclick="window.open('https://gemini.google.com/app', '_blank')">
        🤖 اطرح سؤالك الآن
    </button>

</div>

</body>
</html>
