
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الطالب</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        .logo img {
            width: 150px;
            margin-top: 20px;
        }

        .student-box {
            width: 70%;
            margin: 40px auto;
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 15px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        select, textarea {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .answer {
            margin-top: 20px;
            background: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            color: white;
            display: none;
            font-size: 18px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<div class="logo">
    <img src="logo.jpg">
</div>

<div class="student-box">
    <h1>مرحبًا بك يا طالب</h1>

    <h3>اختر تخصص سؤالك</h3>

    <select id="specialty">
        <option value="tech">تقني 💻</option>
        <option value="medical">طبي 🩺</option>
        <option value="management">إداري 📊</option>
    </select>

    <textarea id="question" placeholder="اكتب سؤالك هنا..."></textarea>

    <button onclick="askGemini()">إرسال</button>

    <div id="answer" class="answer"></div>
</div>

<script>
async function askGemini() {
    let q = document.getElementById("question").value.trim();
    let type = document.getElementById("specialty").value;
    let ans = document.getElementById("answer");

    if (q === "") {
        ans.style.display = "block";
        ans.style.background = "#b71c1c";
        ans.textContent = "✖ الرجاء كتابة سؤال";
        return;
    }

    ans.style.display = "block";
    ans.style.background = "#2e7d32";
    ans.textContent = "⏳ جاري الحصول على الإجابة من Gemini...";

    // 🔥 ضعي مفتاح Gemini API هنا
    const API_KEY = "YOUR_API_KEY_HERE";  // ← ضعي مفتاحك هنا
AIzaSyCMux4tGIY_3cirqNR7r5xSrP_IjTm6smg
    const prompt = `
    أنت مساعد متخصص. أجب بإيجاز ووضوح.
    التخصص: ${type}
    السؤال: ${q}
    `;

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            }
        );

        const data = await response.json();

        if (data.candidates && data.candidates.length > 0) {
            ans.textContent = data.candidates[0].content.parts[0].text;
        } else {
            ans.textContent = "⚠️ لم أستطع الحصول على إجابة من Gemini.";
        }

    } catch (error) {
        ans.textContent = "⚠️ حدث خطأ أثناء الاتصال بـ Gemini.";
    }

    document.getElementById("question").value = "";
}
</script>

</body>
</html>
