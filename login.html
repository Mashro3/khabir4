
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* اللوقو */
        .logo {
            margin-top: 20px;
        }

        .logo img {
            width: 150px;
        }

        /* صندوق تسجيل الدخول */
        .login-box {
            width: 60%;
            margin: 40px auto;
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 15px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 18px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #256628;
        }

        .msg {
            margin-top: 20px;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border-radius: 10px;
            display: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- الهيدر -->
<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<!-- اللوقو -->
<div class="logo">
    <img src="logo.jpg" alt="شعار المنصة">
</div>

<!-- صندوق تسجيل الدخول -->
<div class="login-box">
    <h1>تسجيل الدخول</h1>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <br>
    <input type="password" id="password" placeholder="كلمة المرور">
    <br>

    <button onclick="login()">دخول</button>
<p style="text-align:center; margin-top:15px;">
    ليس لديك حساب؟
    <a href="signup_page.html" style="color:#1B4332; font-weight:bold;">
        إنشاء حساب جديد
    </a>
</p>

    <div id="msg" class="msg">✔ تم تسجيل الدخول بنجاح</div>
</div>

<script>
function login() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    if (user === "" || pass === "") {
        msg.style.display = "block";
        msg.style.background = "#b71c1c";
        msg.textContent = "✖ الرجاء تعبئة جميع الحقول";
        return;
    }

    // إشعار النجاح
    msg.style.display = "block";
    msg.style.background = "#2e7d32";
    msg.textContent = "✔ تم تسجيل الدخول بنجاح";

    // الانتقال بعد ثانيتين
    setTimeout(() => {
        window.location.href = "student.html";
    }, 1500);
}
</script>

</body>
</html>
