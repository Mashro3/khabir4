<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        header a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* اللوغو */
        .logo {
            margin-top: 40px;
        }

        .logo img {
            width: 150px;
            height: auto;
        }

        /* صندوق التسجيل */
        .form-box {
            width: 40%;
            margin: 40px auto;
            background: rgba(0,0,0,0.55);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 15px black;
        }

        .form-box h1 {
            margin-bottom: 25px;
            font-size: 32px;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 18px;
        }

        button {
            padding: 12px 25px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #256628;
        }

        /* رسالة النجاح / الفشل */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            display: none;
        }

        .success {
            background: #2e7d32;
        }

        .error {
            background: #b71c1c;
        }
    </style>
</head>

<body>

<!-- الهيدر -->
<header>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">تعرف على المنصة</a>
    <a href="khabir2.html">المرشد</a>
    <a href="student.html">الطالب</a>
    <a href="class.html">الدرس</a>
</header>

<!-- اللوغو -->
<div class="logo">
    <img src="logo.jpg" alt="شعار خبير">
</div>

<!-- نموذج التسجيل -->
<div class="form-box">
    <h1>تسجيل الدخول</h1>

    <input id="user" type="text" placeholder="اسم المستخدم">
    <input id="pass" type="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <div id="msg" class="message"></div>
</div>

<script>
function login() {
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();
    let msg = document.getElementById("msg");

    if (user === "" || pass === "") {
        msg.style.display = "block";
        msg.className = "message error";
        msg.textContent = "لم يتم التسجيل — يرجى تعبئة جميع الحقول";
        return;
    }

    // نجاح
    msg.style.display = "block";
    msg.className = "message success";
    msg.textContent = "تم التسجيل بنجاح ✔";
}
</script>

</body>
</html>
