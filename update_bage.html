<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث البيانات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            direction: rtl;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            float: right;
            margin-right: 5%;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0 18px 0;
            border-radius: 6px;
            border: 1px solid #bbb;
            font-size: 15px;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>تحديث بيانات الحساب</h2>

    <!-- نرسل البيانات إلى ملف PHP -->
    <form method="POST" action="update_page.php">

        <label>الاسم:</label>
        <input type="text" name="name" required>

        <label>البريد الإلكتروني:</label>
        <input type="email" name="email" required>

        <label>كلمة المرور الجديدة:</label>
        <input type="password" name="password" required>

        <button type="submit">حفظ التعديلات</button>
    </form>
</div>

</body>
</html>
