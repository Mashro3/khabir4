<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>صفحة تسجيل الدخول</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}

nav {
    background: #333;
    width: 100%;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.login-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 300px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #218838;
}

/* قسم المرشدين */
h1 {
    text-align: center;
    margin-top: 40px;
}

.mentors {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding-bottom: 40px;
}

.card {
    background: white;
    padding: 15px;
    width: 230px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

.card button {
    margin-top: 10px;
    padding: 8px;
    background: #4caf50;
}

.chat-box {
    display: none;
    margin-top: 15px;
}

.messages {
    height: 150px;
    overflow-y: auto;
    background: #f0f0f0;
    padding: 10px;
    border-radius: 8px;
    text-align: right;
}

.input-area {
    display: flex;
    margin-top: 10px;
    gap: 5px;
}

.input-area input {
    flex: 1;
    padding: 8px;
}

.message {
    margin: 5px 0;
    padding: 6px 8px;
    background: #e0f2f1;
    border-radius: 5px;
    font-size: 14px;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">الرئيسية</a>
  <a href="khabir2.html">خبير</a>
  <a href="../update_page.html">تحديث الصفحة</a>
</nav>

<!-- تسجيل الدخول -->
<div class="login-container">
<h2>تسجيل الدخول</h2>

<form action="login.php" method="POST">
    <input type="text" name="username" placeholder="اسم المستخدم" required>
    <input type="password" name="password" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
</form>
</div>

<!-- قسم المرشدين -->
<h1>اختر مرشدك</h1>

<div class="mentors">

    <!-- بطاقة 1 -->
    <div class="card">
        <h3>مرشد تقنية</h3>
        <p>تخصص برمجة</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد التقنية 👨‍💻</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 2 -->
    <div class="card">
        <h3>مرشد طبي</h3>
        <p>تخصص طب</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد طبي 🩺</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 3 -->
    <div class="card">
        <h3>مرشد إدارة</h3>
        <p>إدارة أعمال</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد إداري 📊</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

</div>

<script>
function toggleChat(button) {
    let card = button.parentElement;
    let chat = card.querySelector(".chat-box");

    chat.style.display = (chat.style.display === "none" || chat.style.display === "")
        ? "block"
        : "none";
}

function sendMessage(btn) {
    let card = btn.closest(".card");
    let input = card.querySelector(".input-area input");
    let messages = card.querySelector(".messages");

    let msg = input.value.trim();
    if (msg === "") return;

    messages.innerHTML += `<div class="message">${msg}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
