<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>صفحة تسجيل الدخول</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5dc;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}

nav {
    background: #333;
    width: 100%;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.login-container {
    background: ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 8px 20px rgba(0,0,0,0.5);
    width: 350px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #C1E1C1;
    border-radius: 6px;
    box-sizing:border-box;
    outline:none;

}

    input:focus{
        border-color:#90EE90
    }


button {
    width: 100%;
    padding: 12px;
    background-color: #90EE90;
    color: #333;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weght:bold;
    transition:background 0.3s ease;
}

button:hover {
    background-color: #7CCD7C;
}

/* قسم المرشدين */
h1 {
    text-align: center;
    margin-top: 40px;
}

.mentors {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding-bottom: 40px;
    background-color:#F5F5DC;
}

.card {
    background: white;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba (0,0,0,0.05);
    border:1px solid#E0D7C6;
    transition:transfrom 0.3s ease;
}
.card:hover{
    transfrom:translatey(-5px);
}

.card button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #2D5A27;
    color:white;
    border:none;
    border:radius: 8px
    cursor:pointer;
    font-weight:blod;
    transition:background 0.3s;
}

.chat-box {
   display: none;
    margin-top: 15px;
    border:1px solid #E0D7C6;
    border-radius:12px;
    overflow: hidden;
}

.messages {
    height: 200px;
    overflow-y: auto;
    background: #FCFAF5;
    padding: 15px;
    border-radius: 8px;
    text-align: right;
    display: flex;
    flex-direction:column;
    gap:8px
}

.input-area {
    display: flex;
    margin-top: 15px;
    gap: 8px;
    padding:10px
    background:# fff;
    border-top:1px solid #E0D7C6
}

.input-area input {
    flex: 1;
    padding: 12px 15px;
    border-1.5 solid #E0D7C6;
    border-radius:25px;
    outline: all 0.3s ease;
}

.message {
    margin: 8px 0;
    padding: 10px 14px;
    background-color: #F9F7F2;
    border-radius: 12px;
    font-size: 14px;
    color:#333;
    line-height: 1.5;
    max-width: 85%;
    width: fil-content;
}
</style>
</head>

<body>
<header>
    <img src="../logo.png" alt="شعار خبير">
    <h1>منصة خبير</h1>
</header>

<nav>
  <a href="../index.html">الرئيسية</a>
  <a href="khabir2.html">خبير</a>
  <a href="../update_page.html">تحديث الصفحة</a>
</nav>

<!-- تسجيل الدخول -->
<div class="login-container" id="login-box">
<h2>تسجيل الدخول</h2>

<form id="loginForm">
    <input type="text" name="username" placeholder="اسم المستخدم" required>
    <input type="password" name="password" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
</form>
</div>

<!-- قسم المرشدين (مخفي في البداية) -->
<div id="experts-section" style="display:none; width:100%;">

<h1>اختر مرشدك</h1>

<div class="mentors">

    <!-- بطاقة 1 -->
    <div class="card">
        <h3>مرشد تقنية</h3>
        <p>تخصص برمجة</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد التقنية 👨‍💻</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 2 -->
    <div class="card">
        <h3>مرشد طبي</h3>
        <p>تخصص طب</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد طبي 🩺</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

    <!-- بطاقة 3 -->
    <div class="card">
        <h3>مرشد إدارة</h3>
        <p>إدارة أعمال</p>

        <button onclick="toggleChat(this)">تواصل</button>

        <div class="chat-box">
            <div class="messages">
                <div class="message">بدأت المحادثة مع مرشد إداري 📊</div>
            </div>

            <div class="input-area">
                <input type="text" placeholder="اكتب رسالتك...">
                <button onclick="sendMessage(this)">ارسال</button>
            </div>
        </div>
    </div>

</div>
</div>

<script>
function toggleChat(button) {
    let card = button.parentElement;
    let chat = card.querySelector(".chat-box");

    chat.style.display = (chat.style.display === "none" || chat.style.display === "")
        ? "block"
        : "none";
}

function sendMessage(btn) {
    let card = btn.closest(".card");
    let input = card.querySelector(".input-area input");
    let messages = card.querySelector(".messages");

    let msg = input.value.trim();
    if (msg === "") return;

    messages.innerHTML += `<div class="message">${msg}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;
}

// عند الضغط على دخول
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); // منع الانتقال لصفحة login.php

    document.getElementById("login-box").style.display = "none"; // إخفاء تسجيل الدخول
    document.getElementById("experts-section").style.display = "block"; // إظهار الخبراء
});
</script>

</body>
</html>
