<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل بيانات الحساب</title>

    <style>
        body {
            font-family: "Tajawal", sans-serif;
            margin: 0;
            background: #ffffff;
        }

        /* الهيدر */
        header {
            background: #2e7d32; /* أخضر */
            padding: 15px 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 55px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 18px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: #fffbea; /* أصفر فاتح */
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #f4d03f; /* أصفر */
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2e7d32; /* أخضر */
        }

        label {
            font-size: 16px;
            margin-bottom: 8px;
            display: block;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #f4d03f; /* أصفر */
            border: none;
            color: #2e7d32; /* أخضر */
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #f1c40f;
        }
    </style>
</head>

<body>

    <!-- الهيدر -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="شعار خبير">
        </div>

        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="class.html">الدروس</a>
            <a href="khabir2.html">الخبراء</a>
        </nav>
    </header>

    <!-- المحتوى -->
    <div class="container">
        <h2>تعديل بيانات الحساب</h2>

        <form>
            <label>الاسم الكامل</label>
            <input type="text" placeholder="اكتب اسمك">

            <label>البريد الإلكتروني</label>
            <input type="email" placeholder="example@email.com">

            <label>رقم الجوال</label>
            <input type="text" placeholder="05xxxxxxxx">

            <label>كلمة المرور الجديدة</label>
            <input type="password" placeholder="••••••••">

            <button type="submit">حفظ التعديلات</button>
        </form>
    </div>

</body>
</html>
